# 灵镜 (LingPrism) — Docker Compose
#
# 数据层（Batch 0）:
#   cd infra/docker && docker compose up -d
#
# 全栈（Batch 4，含应用 + Nginx）:
#   cd infra/docker && docker compose --profile app up -d --build
#
# 验收:
#   docker compose ps
#   curl http://localhost:8080/api/health   # 需 --profile app

name: lingprism

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # 数据层（默认启动，无 profile）
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: lingprism-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lingprism}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lingprism}
      MYSQL_USER: ${MYSQL_USER:-lingprism}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lingprism}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p${MYSQL_ROOT_PASSWORD:-lingprism} && mysql -h 127.0.0.1 -u ${MYSQL_USER:-lingprism} -p${MYSQL_PASSWORD:-lingprism} -e 'SELECT 1' ${MYSQL_DATABASE:-lingprism}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: lingprism-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  neo4j:
    image: neo4j:5.26-community
    container_name: lingprism-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-lingprism}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: lingprism-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: lingprism-opensearch
    restart: unless-stopped
    ports:
      - "${OPENSEARCH_HOST_PORT:-9200}:9200"
      - "${OPENSEARCH_PERF_PORT:-9600}:9600"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # 应用层（--profile app）
  # ---------------------------------------------------------------------------
  migrate:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.migrate
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: lingprism-migrate
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-lingprism}:${MYSQL_PASSWORD:-lingprism}@mysql:3306/${MYSQL_DATABASE:-lingprism}
      FORCE_REIMPORT: ${FORCE_REIMPORT:-false}
    restart: "no"
    logging: *default-logging

  api:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: lingprism-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ai-worker:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_PORT: "4000"
      DATABASE_URL: mysql://${MYSQL_USER:-lingprism}:${MYSQL_PASSWORD:-lingprism}@mysql:3306/${MYSQL_DATABASE:-lingprism}
      REDIS_URL: redis://redis:6379/0
      CORE_GRPC_ADDR: core:50051
      AI_WORKER_URL: http://ai-worker:8001
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://user.localhost:8080,http://admin.localhost:8080,http://monitor.localhost:8080}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  core:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.core
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    container_name: lingprism-core
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      indexer:
        condition: service_started
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORE_HTTP_PORT: "8080"
      CORE_GRPC_PORT: "50051"
      MYSQL_DSN: ${MYSQL_USER:-lingprism}:${MYSQL_PASSWORD:-lingprism}@tcp(mysql:3306)/${MYSQL_DATABASE:-lingprism}?parseTime=true
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-lingprism}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-lingprism_v1_zhipu_1024}
      ZHIPU_EMBEDDING_DIM: ${ZHIPU_EMBEDDING_DIM:-1024}
      OPENSEARCH_URL: http://opensearch:9200
      REDIS_URL: redis://redis:6379/0
      INDEXER_GRPC_ADDR: indexer:50052
      INDEXER_BINARY: lingprism-indexer
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-zhipu}
    logging: *default-logging

  indexer:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.indexer
    container_name: lingprism-indexer
    restart: unless-stopped
    command: ["version"]
    logging: *default-logging

  ai-worker:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ai-worker
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: lingprism-ai-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started
    environment:
      AI_WORKER_HTTP_PORT: "8001"
      CORE_HTTP_URL: http://core:8080
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LLM_PROVIDER: ${LLM_PROVIDER:-zhipu}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-zhipu}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      ZHIPU_MODEL: ${ZHIPU_MODEL:-glm-4-plus}
      ZHIPU_EMBEDDING_MODEL: ${ZHIPU_EMBEDDING_MODEL:-embedding-3}
      QDRANT_URL: http://qdrant:6333
      ZHIPU_EMBEDDING_DIM: ${ZHIPU_EMBEDDING_DIM:-1024}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  ai-worker-celery:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ai-worker
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: lingprism-ai-worker-celery
    restart: unless-stopped
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app", "inspect", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LLM_PROVIDER: ${LLM_PROVIDER:-zhipu}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-zhipu}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
    logging: *default-logging

  mcp:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.mcp
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: lingprism-mcp
    restart: unless-stopped
    depends_on:
      core:
        condition: service_started
    environment:
      MCP_PORT: "8090"
      MCP_API_KEYS: ${MCP_API_KEYS:-dev-key-1,dev-key-2}
      MCP_PROTOCOL_VERSION: ${MCP_PROTOCOL_VERSION:-2025-03-26}
      LINGPRISM_INTERNAL_API_URL: http://core:8080
    logging: *default-logging

  user:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP: user
        APP_PORT: "3000"
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:8080/graphql}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: lingprism-user
    restart: unless-stopped
    environment:
      PORT: "3000"
    logging: *default-logging

  admin:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP: admin
        APP_PORT: "3001"
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:8080/graphql}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: lingprism-admin
    restart: unless-stopped
    environment:
      PORT: "3001"
    logging: *default-logging

  monitor:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP: monitor
        APP_PORT: "3002"
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:8080/graphql}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: lingprism-monitor
    restart: unless-stopped
    environment:
      PORT: "3002"
    logging: *default-logging

  nginx:
    profiles: ["app"]
    image: nginx:1.27-alpine
    container_name: lingprism-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
      mcp:
        condition: service_started
      user:
        condition: service_started
      admin:
        condition: service_started
      monitor:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:
  neo4j_data:
  qdrant_data:
  opensearch_data:
