# LingPrism reverse proxy — 三前端 + GraphQL + REST/SSE API + MCP
# 默认入口: http://localhost:8080
# 子域入口: user.localhost / admin.localhost / monitor.localhost / api.localhost / mcp.localhost
#
# 使用 resolver + 变量 proxy_pass，避免 nginx -t / 启动时 upstream DNS 未就绪

resolver 127.0.0.11 ipv6=off valid=30s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Default unified entry — localhost:8080
server {
    listen 80 default_server;
    server_name localhost;

    location /graphql {
        set $api_upstream http://api:4000;
        proxy_pass $api_upstream/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/health {
        set $api_upstream http://api:4000;
        proxy_pass $api_upstream/health;
    }

    location /api/ {
        set $api_upstream http://api:4000;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /mcp {
        set $mcp_upstream http://mcp:8090;
        proxy_pass $mcp_upstream/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header MCP-Protocol-Version $http_mcp_protocol_version;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location / {
        set $user_upstream http://user:3000;
        proxy_pass $user_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

