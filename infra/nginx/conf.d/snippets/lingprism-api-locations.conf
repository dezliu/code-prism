# Shared API reverse-proxy locations (GraphQL + REST/SSE).
# Include inside each server {} that serves a frontend entrypoint.

location /graphql {
    set $api_upstream http://api:4000;
    proxy_pass $api_upstream/graphql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

location = /api/health {
    set $api_upstream http://api:4000;
    proxy_pass $api_upstream/health;
}

location /api/ {
    set $api_upstream http://api:4000;
    proxy_pass $api_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
}
